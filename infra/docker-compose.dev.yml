version: "3.9"

# ── KnessetIL Full Dev Stack ───────────────────────────────────────────────────
# Runs everything: Redis + PostgreSQL + FastAPI (hot-reload) + Next.js (hot-reload)
# Usage (from repo root):
#   docker compose -f infra/docker-compose.dev.yml up
#   docker compose -f infra/docker-compose.dev.yml down

services:

  # ── Data layer ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: knesset_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: knesset_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: knesset
      POSTGRES_PASSWORD: knesset
      POSTGRES_DB: knessetil
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knesset -d knessetil"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI (hot-reload via uvicorn --reload) ─────────────────────────────────
  api:
    image: python:3.11-slim
    container_name: knesset_api
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt -q &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      ALLOWED_ORIGINS: "http://localhost:3000"
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql+asyncpg://knesset:knesset@postgres:5432/knessetil
      OKNESSET_BASE_URL: https://production.oknesset.org/pipelines/data
      OKNESSET_SYNC_INTERVAL_HOURS: "6"
      RATE_LIMIT_DEFAULT: "100/minute"
      LOG_LEVEL: INFO
    volumes:
      - ../apps/api:/app        # live code mount → hot-reload works
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s        # give pip install time

  # ── Next.js dev server (hot-reload) ──────────────────────────────────────────
  web:
    image: node:20-alpine
    container_name: knesset_web
    working_dir: /app
    command: >
      sh -c "npm install -g pnpm &&
             pnpm install &&
             pnpm dev"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: development
      WATCHPACK_POLLING: "true"    # needed for file watching inside Docker on Windows
    volumes:
      - ../apps/web:/app
      - ../packages:/packages
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    depends_on:
      - api

volumes:
  redis_data:
  pg_data:
  web_node_modules:
  web_next:
